name: Rust CI
on:
  push:
    branches: [master, legacy/v0.1.0]
  pull_request:
    branches: [master, legacy/v0.1.0]
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pin a concrete version: foundryup only queries the (anonymous,
          # rate-limited) GitHub API to resolve the "stable"/"nightly"
          # channels. A pinned tag is downloaded directly from release
          # assets, avoiding the HTTP 403 rate-limit failures seen in CI.
          version: v1.7.1

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true
          components: rustfmt, clippy
      - name: Configure cache
        uses: Swatinem/rust-cache@v2
      
      - name: Run fmt
        run: cargo fmt --all -- --check
      - name: Clippy default features (no serving/postgres — opt-in/OPTIN check)
        run: cargo clippy
      - name: Run clippy
        run: cargo clippy --all-features

      # Default-feature tests must pass with no Docker and compile no PostgreSQL
      # code (postgres-store.FEATURE.2 / TESTING.2).
      - name: Run tests (default features, no Docker)
        run: cargo test

      # Serving on, postgres off: the only combination that compiles and runs
      # the feature-off guard `into_router_rejects_postgres_url_when_feature_off`
      # (a `postgres://` URL must error, not panic — postgres-store.FEATURE.2).
      # `--all-features` turns postgres on and cfg's that test out, so without
      # this job it would never execute. No Docker needed (no postgres suite).
      - name: Run tests (serving only, postgres feature off)
        run: cargo test --features serving

      # `--all-features` includes the `postgres` suite, whose integration tests
      # provision a throwaway PostgreSQL container via testcontainers. The
      # ubuntu-latest runner ships a running Docker daemon, so no extra service
      # setup is needed (postgres-store.TESTING.1).
      - name: Run tests (all features, provisions PostgreSQL via Docker)
        run: cargo test --all-features

      - name: Clean docs folder
        run: cargo clean --doc

      - name: Build docs
        run: cargo doc --no-deps
      
