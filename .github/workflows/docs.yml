name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Build rustdoc
        run: cargo doc --no-deps

      - name: Prepare Pages artifact
        # rustdoc emits no top-level index.html; redirect to the crate root.
        # The .lock file is unreadable by the artifact tar step.
        run: |
          rm -f target/doc/.lock
          echo '<meta http-equiv="refresh" content="0; url=artemis_light/index.html">' > target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
