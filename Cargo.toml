[package]
name = "artemis-light"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
## async
async-trait = "0.1"
futures = "0.3"
tokio = { version = "1.44", features = ["full"] }
tokio-stream = { version = "0.1", features = ['sync'] }
tokio-util = "0.7"
alloy = { version = "1.0", features = [
    "full",
    "node-bindings",
] }
## persistence
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-stream = "0.3"
## misc
anyhow = "1.0.97"
tracing = "0.1.41"

[dev-dependencies]
## `test-util` enables `tokio::time::pause`/`start_paused` so the collector
## driver's backoff timing can be asserted on virtual time.
tokio = { version = "1.44", features = ["full", "test-util"] }

[[example]]
name = "basic_example"
path = "examples/basic_example.rs"

[[example]]
name = "persistence_example"
path = "examples/persistence_example.rs"